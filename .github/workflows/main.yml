name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o app2_cleaned.zip -d project

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Write .env with Gemini key
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > project/app2/.env

      - name: Grant execute permission to gradlew
        run: chmod +x project/app2/gradlew

      - name: Build debug APK
        working-directory: project/app2
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: project/app2/app/build/outputs/apk/debug/app-debug.apk
